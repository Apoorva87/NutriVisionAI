# XcodeGen project spec — run `xcodegen generate` to create the .xcodeproj
# Install: brew install xcodegen
#
# BUILD CONFIGURATIONS:
# - Backend Only (default): Uses your server API for food analysis
# - Apple Foundation Models: Includes on-device Apple AI (requires iOS 26+)
#
# To switch configurations, see the README for build scripts.

name: NutriVisionAI
options:
  bundleIdPrefix: com.nutrivisionai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

# Shared settings for all configurations
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

# Build configurations
configs:
  Debug: debug
  Release: release
  Debug-AppleAI: debug
  Release-AppleAI: release

targets:
  NutriVisionAI:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - Package.swift
          - project.yml
          - "*.md"
          - "*.xcodeproj"
          - ".swiftpm"
          - ".build"
          - ".DS_Store"
          - Data
    resources:
      - path: Data
        type: folder
    settings:
      base:
        PRODUCT_NAME: NutriVisionAI
        PRODUCT_BUNDLE_IDENTIFIER: com.nutrivisionai.app
        INFOPLIST_KEY_CFBundleDisplayName: NutriVision
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSCameraUsageDescription: "NutriVision needs camera access to scan food photos"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "NutriVision needs photo library access to select food photos"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
        Debug-AppleAI:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG APPLE_FOUNDATION_MODELS
          IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        Release-AppleAI:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPLE_FOUNDATION_MODELS
          IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: NutriVision
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: "NutriVision needs camera access to scan food photos"
        NSPhotoLibraryUsageDescription: "NutriVision needs photo library access to select food photos"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIBackgroundModes: []

schemes:
  NutriVisionAI:
    build:
      targets:
        NutriVisionAI: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  NutriVisionAI-AppleAI:
    build:
      targets:
        NutriVisionAI: all
    run:
      config: Debug-AppleAI
    test:
      config: Debug-AppleAI
    profile:
      config: Release-AppleAI
    analyze:
      config: Debug-AppleAI
    archive:
      config: Release-AppleAI
